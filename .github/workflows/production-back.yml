name: Backend CI/CD Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "backend/**"
      - ".github/workflows/**"

  workflow_dispatch:
    inputs:
      change_type:
        description: "Tipo de mudanca (novo-marco, nova-feature, bug-fix, outros)"
        required: true
        default: "nova-feature"
        type: choice
        options:
          - novo-marco
          - nova-feature
          - bug-fix
          - outros

jobs:
  # --------------------------------------------------------------------
  # 0) TAG CREATION ----------------------------------------------------
  # --------------------------------------------------------------------
  tag-creation:
    name: 0. Automatic Creation Process of New Tags
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    outputs:
      created_tag: ${{ steps.created_tag.outputs.created_tag }}
      change_type: ${{ steps.change_type.outputs.change_type }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: sudo apt-get install -y gh

      - name: Write PR body and log context
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "PR merged: ${{ github.event.pull_request.merged }}"
          printf '%s' "$PR_BODY" > body.txt
          echo "--- PR body ---"
          cat body.txt
          echo "--- end ---"

      - name: Extract type of change from PR
        id: change_type
        if: github.event.pull_request.merged == true
        run: |
          change_type=""
          if grep -qiE "\[x\]\s*\`?novo-marco\`?" body.txt; then
            change_type="novo-marco"
          elif grep -qiE "\[x\]\s*\`?nova-feature\`?" body.txt; then
            change_type="nova-feature"
          elif grep -qiE "\[x\]\s*\`?bug-fix\`?" body.txt; then
            change_type="bug-fix"
          elif grep -qiE "\[x\]\s*\`?outros\`?" body.txt; then
            change_type="outros"
          else
            echo "Nenhuma opcao marcada corretamente no corpo do PR. Conteudo:"
            cat body.txt
            exit 1
          fi
          echo "Tipo detectado: $change_type"
          echo "change_type=$change_type" >> "$GITHUB_OUTPUT"

      - name: Get the last release tag
        id: last_tag
        run: |
          gh auth setup-git
          tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [[ -z "$tag" ]]; then tag="0.0.0"; fi
          echo "last_tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Calculate new tag
        id: created_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            change_type="${{ github.event.inputs.change_type }}"
          else
            change_type="${{ steps.change_type.outputs.change_type }}"
          fi
          IFS='.' read -r major minor patch <<< "${{ steps.last_tag.outputs.last_tag }}"
          case "$change_type" in
            bug-fix|outros)
              patch=$((patch + 1))
              ;;
            nova-feature)
              minor=$((minor + 1))
              patch=0
              ;;
            novo-marco)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
          esac
          created_tag="${major}.${minor}.${patch}"
          echo "Nova tag: $created_tag"
          echo "created_tag=$created_tag" >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------
  # 1) BACKEND DOCKER --------------------------------------------------
  # --------------------------------------------------------------------
  backend-docker:
    name: 1. Backend CI/CD
    runs-on: ubuntu-latest
    needs: tag-creation
    env:
      CREATED_TAG: ${{ needs.tag-creation.outputs.created_tag }}
      CHANGE_TYPE: ${{ needs.tag-creation.outputs.change_type }}
      REGISTRY: ghcr.io
      IMAGE_NAME: polifarm-backend
    permissions:
      contents: write
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0"

      - name: Restore dependencies
        run: |
          cd backend
          dotnet restore

      - name: Build
        run: |
          cd backend
          dotnet build --no-restore

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_PACKAGES_USER }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:$CREATED_TAG \
            -f backend/Dockerfile ./backend

      - name: Tag image as latest
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:$CREATED_TAG \
                     ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.CREATED_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Push Docker images (version and latest)
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:$CREATED_TAG
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

  # --------------------------------------------------------------------
  # 3) RELEASE CREATION ------------------------------------------------
  # --------------------------------------------------------------------
  release-creation:
    name: 3. Automatic Creation Process of New Releases
    runs-on: ubuntu-latest
    needs: [tag-creation, backend-docker]
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    env:
      CREATED_TAG: ${{ needs.tag-creation.outputs.created_tag }}
      CHANGE_TYPE: ${{ needs.tag-creation.outputs.change_type }}
      REGISTRY: ghcr.io
      IMAGE_NAME: polifarm-backend
    steps:
      - uses: actions/checkout@v4

      - name: Release Publication
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.CREATED_TAG }}
          name: Release ${{ env.CREATED_TAG }}
          generate_release_notes: true
          body: |
            Release gerada automaticamente.
            Tipo de mudanca: ${{ env.CHANGE_TYPE || github.event.inputs.change_type }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
