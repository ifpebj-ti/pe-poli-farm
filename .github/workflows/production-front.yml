name: Frontend CI/CD Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "frontend/**"
      - ".github/workflows/**"

  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------
  # 0) TAG CREATION ----------------------------------------------------
  # --------------------------------------------------------------------
  tag-creation:
    name: 0. Automatic Creation Process of New Tags
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    outputs:
      created_tag: ${{ steps.created_tag.outputs.created_tag }}
      change_type: ${{ steps.change_type.outputs.change_type }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: sudo apt-get install -y gh

      - name: Write PR body and log context
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "PR merged: ${{ github.event.pull_request.merged }}"
          printf '%s' "$PR_BODY" > body.txt
          echo "--- PR body ---"
          cat body.txt
          echo "--- end ---"

      - name: Extract type of change from PR
        id: change_type
        if: github.event.pull_request.merged == true
        run: |
          change_type=""
          if grep -qiE "\[x\]\s*\`?novo-marco\`?" body.txt; then
            change_type="novo-marco"
          elif grep -qiE "\[x\]\s*\`?nova-feature\`?" body.txt; then
            change_type="nova-feature"
          elif grep -qiE "\[x\]\s*\`?bug-fix\`?" body.txt; then
            change_type="bug-fix"
          elif grep -qiE "\[x\]\s*\`?outros\`?" body.txt; then
            change_type="outros"
          else
            echo "Nenhuma opcao marcada corretamente no corpo do PR. Conteudo:"
            cat body.txt
            exit 1
          fi
          echo "Tipo detectado: $change_type"
          echo "change_type=$change_type" >> "$GITHUB_OUTPUT"

      - name: Get the last release tag
        id: last_tag
        run: |
          gh auth setup-git
          tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [[ -z "$tag" ]]; then tag="0.0.0"; fi
          echo "last_tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Calculate new tag
        id: created_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            created_tag="${{ steps.last_tag.outputs.last_tag }}"
            echo "Dispatch manual: reutilizando tag $created_tag"
          else
            IFS='.' read -r major minor patch <<< "${{ steps.last_tag.outputs.last_tag }}"
            case "${{ steps.change_type.outputs.change_type }}" in
              bug-fix|outros)
                patch=$((patch + 1))
                ;;
              nova-feature)
                minor=$((minor + 1))
                patch=0
                ;;
              novo-marco)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
            esac
            created_tag="${major}.${minor}.${patch}"
          fi
          echo "Nova tag: $created_tag"
          echo "created_tag=$created_tag" >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------
  # 2) FRONTEND DOCKER -------------------------------------------------
  # --------------------------------------------------------------------
  frontend-docker:
    name: 2. Frontend CI/CD
    runs-on: ubuntu-latest
    needs: tag-creation
    env:
      CREATED_TAG: ${{ needs.tag-creation.outputs.created_tag }}
      REGISTRY: ghcr.io
      IMAGE_NAME: polifarm-frontend
    permissions:
      contents: read
      packages: write
      security-events: write
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:$CREATED_TAG \
            -f Dockerfile .

      - name: Tag image as latest
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:$CREATED_TAG \
                     ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.CREATED_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Push Docker images (version and latest)
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:$CREATED_TAG
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

  # --------------------------------------------------------------------
  # 3) RELEASE CREATION ------------------------------------------------
  # --------------------------------------------------------------------
  release-creation:
    name: 3. Automatic Creation Process of New Releases
    runs-on: ubuntu-latest
    needs: [tag-creation, frontend-docker]
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    env:
      CREATED_TAG: ${{ needs.tag-creation.outputs.created_tag }}
      CHANGE_TYPE: ${{ needs.tag-creation.outputs.change_type }}
      REGISTRY: ghcr.io
      IMAGE_NAME: polifarm-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Release Publication
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.CREATED_TAG }}
          name: Release ${{ env.CREATED_TAG }}
          generate_release_notes: true
          body: |
            Release gerada automaticamente.
            Tipo de mudanca: ${{ env.CHANGE_TYPE || 'Manual Dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
